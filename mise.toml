# mise configuration for the English Conversation Tutor app.
# Docs: https://mise.jdx.dev

[tools]
node = "26"

# Load local secrets (OPENCODE_API_KEY, DATABASE_URL) into every task.
# Copy .env.example -> .env.local first. This file is git-ignored.
[env]
_.file = ".env.local"

[tasks.install]
description = "Install npm dependencies"
run = "npm install"

[tasks.setup]
description = "First-time setup: install deps and push the DB schema to Neon"
depends = ["install"]
run = "npm run db:push"

[tasks.dev]
description = "Run the Next.js dev server (http://localhost:3000)"
run = "npm run dev"

[tasks.build]
description = "Production build"
run = "npm run build"

[tasks.start]
description = "Start the production server (after build)"
run = "npm run start"

[tasks.typecheck]
description = "TypeScript type checking (no emit)"
run = "npm run typecheck"

[tasks."db:generate"]
description = "Generate SQL migrations from the Drizzle schema"
run = "npm run db:generate"

[tasks."db:migrate"]
description = "Apply generated migrations to Neon"
run = "npm run db:migrate"

[tasks."db:push"]
description = "Push the Drizzle schema straight to Neon (dev-friendly)"
run = "npm run db:push"

[tasks."db:studio"]
description = "Open Drizzle Studio to inspect the database"
run = "npm run db:studio"
